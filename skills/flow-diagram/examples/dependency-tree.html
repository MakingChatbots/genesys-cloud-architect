<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flow Dependency Diagram</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xyflow/react@12/dist/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #root { width: 100%; height: 100%; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; }

        .flow-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 16px 18px;
            min-width: 200px;
            max-width: 260px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            border: 1px solid #334155;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .flow-card:hover {
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            border-color: #475569;
        }

        .flow-card .type-badge {
            display: inline-block;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 3px 8px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
        .type-inbound   { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
        .type-digitalbot { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
        .type-bot        { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }

        .flow-card .flow-name {
            font-size: 13px;
            font-weight: 600;
            color: #f1f5f9;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .flow-card .section-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        .flow-card .data-action-item {
            font-size: 11px;
            color: #cbd5e1;
            padding: 4px 8px;
            margin-bottom: 3px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            border-left: 2px solid #f59e0b;
        }

        .flow-card .no-actions {
            font-size: 11px;
            color: #475569;
            font-style: italic;
        }

        .react-flow__edge-path {
            stroke: #475569 !important;
            stroke-width: 2px;
        }
        .react-flow__edge.animated path {
            stroke: #60a5fa !important;
        }
        .react-flow__attribution { display: none; }
        .react-flow__controls {
            background: #1e293b !important;
            border: 1px solid #334155 !important;
            border-radius: 8px !important;
            overflow: hidden;
        }
        .react-flow__controls button {
            background: #1e293b !important;
            color: #94a3b8 !important;
            border-color: #334155 !important;
        }
        .react-flow__controls button:hover {
            background: #334155 !important;
        }
        .react-flow__controls button svg { fill: #94a3b8 !important; }
        .react-flow__minimap {
            background: #0f172a !important;
            border: 1px solid #334155 !important;
            border-radius: 8px !important;
        }

        .diagram-title {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 10;
            color: #f1f5f9;
            font-size: 16px;
            font-weight: 700;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid #334155;
        }
        .diagram-title .subtitle {
            font-size: 11px;
            font-weight: 400;
            color: #64748b;
            margin-top: 2px;
        }

        .legend {
            position: absolute;
            bottom: 16px;
            left: 16px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #334155;
            display: flex;
            gap: 16px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #94a3b8;
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
    </style>

    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.3.1",
            "react/": "https://esm.sh/react@18.3.1/",
            "react-dom": "https://esm.sh/react-dom@18.3.1?external=react",
            "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?external=react",
            "@xyflow/react": "https://esm.sh/@xyflow/react@12?external=react,react-dom"
        }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import React, { createElement as h, useCallback } from 'react';
        import { createRoot } from 'react-dom/client';
        import {
            ReactFlow,
            Background,
            Controls,
            MiniMap,
            Handle,
            Position,
            useNodesState,
            useEdgesState,
        } from '@xyflow/react';

        const TYPE_CONFIG = {
            INBOUNDSHORTMESSAGEFLOW: { label: 'Inbound Message', className: 'type-inbound', color: '#3b82f6' },
            DIGITALBOTFLOW:          { label: 'Digital Bot',     className: 'type-digitalbot', color: '#8b5cf6' },
            BOTFLOW:                 { label: 'Bot Flow',        className: 'type-bot', color: '#10b981' },
        };

        function FlowNode({ data }) {
            const cfg = TYPE_CONFIG[data.flowType] || { label: data.flowType, className: '', color: '#64748b' };

            return h('div', { className: 'flow-card' },
                h(Handle, { type: 'target', position: Position.Top, style: { background: '#475569', width: 8, height: 8 } }),
                h('div', { className: `type-badge ${cfg.className}` }, cfg.label),
                h('div', { className: 'flow-name' }, data.label),
                data.dataActions.length > 0
                    ? h('div', null,
                        h('div', { className: 'section-label' }, 'Data Actions'),
                        ...data.dataActions.map((da, i) =>
                            h('div', { key: i, className: 'data-action-item' }, da)
                        )
                    )
                    : h('div', { className: 'no-actions' }, 'No data actions'),
                h(Handle, { type: 'source', position: Position.Bottom, style: { background: '#475569', width: 8, height: 8 } }),
            );
        }

        const nodeTypes = { flowNode: FlowNode };

        const flowTree = [
            {
                id: 'root',
                name: 'makingchatbots.com Newsletter',
                type: 'INBOUNDSHORTMESSAGEFLOW',
                dataActions: [],
            },
            {
                id: 'newsletter',
                name: 'Newsletter Bot',
                type: 'DIGITALBOTFLOW',
                dataActions: [
                    'Subscribe',
                    'About',
                ],
            },
            {
                id: 'linkedin',
                name: 'LinkedIn Bot',
                type: 'DIGITALBOTFLOW',
                dataActions: ['Follow'],
            },
        ];

        const childIds = flowTree.slice(1).map(f => f.id);
        const childCount = childIds.length;
        const spacing = 300;
        const totalWidth = (childCount - 1) * spacing;
        const startX = -totalWidth / 2;

        const initialNodes = flowTree.map((flow, i) => ({
            id: flow.id,
            type: 'flowNode',
            position: i === 0
                ? { x: 0, y: 0 }
                : { x: startX + (i - 1) * spacing, y: 320 },
            data: {
                label: flow.name,
                flowType: flow.type,
                dataActions: flow.dataActions,
            },
        }));

        const initialEdges = childIds.map(childId => ({
            id: `root-${childId}`,
            source: 'root',
            target: childId,
            animated: true,
            style: { stroke: '#475569', strokeWidth: 2 },
        }));

        function App() {
            const [nodes, , onNodesChange] = useNodesState(initialNodes);
            const [edges, , onEdgesChange] = useEdgesState(initialEdges);

            return h('div', { style: { width: '100%', height: '100%', position: 'relative' } },
                h('div', { className: 'diagram-title' },
                    'Flow Dependency Tree',
                    h('div', { className: 'subtitle' }, 'makingchatbots.com Newsletter'),
                ),
                h(ReactFlow, {
                    nodes,
                    edges,
                    onNodesChange,
                    onEdgesChange,
                    nodeTypes,
                    fitView: true,
                    fitViewOptions: { padding: 0.3 },
                    minZoom: 0.3,
                    maxZoom: 2,
                    proOptions: { hideAttribution: true },
                },
                    h(Background, { color: '#1e293b', gap: 20, size: 1 }),
                    h(Controls, null),
                    h(MiniMap, {
                        nodeColor: (node) => {
                            const cfg = TYPE_CONFIG[node.data?.flowType];
                            return cfg ? cfg.color : '#64748b';
                        },
                        maskColor: 'rgba(15, 23, 42, 0.8)',
                    }),
                ),
                h('div', { className: 'legend' },
                    h('div', { className: 'legend-item' },
                        h('div', { className: 'legend-dot', style: { background: '#3b82f6' } }),
                        'Inbound Message Flow',
                    ),
                    h('div', { className: 'legend-item' },
                        h('div', { className: 'legend-dot', style: { background: '#8b5cf6' } }),
                        'Digital Bot Flow',
                    ),
                    h('div', { className: 'legend-item' },
                        h('div', { className: 'legend-dot', style: { background: '#f59e0b' } }),
                        'Data Action',
                    ),
                ),
            );
        }

        createRoot(document.getElementById('root')).render(h(App));
    </script>
</body>
</html>
